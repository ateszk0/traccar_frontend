<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Traccar+</title>
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg">

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Traccar+">
    <link rel="apple-touch-icon" href="/icons/icon.svg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

    <!-- App CSS -->
    <link rel="stylesheet" href="src/style.css?v=11">
</head>

<body>
    <!-- Failsafe Error Display for Debugging -->
    <div id="global-error-display" style="display:none; position:fixed; top:0; left:0; width:100%; background:red; color:white; z-index:999999; padding:20px; font-size:12px; font-family:monospace; word-break:break-all;"></div>
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            var el = document.getElementById('global-error-display');
            el.style.display = 'block';
            el.innerHTML += 'ERROR: ' + msg + '<br>URL: ' + url + '<br>Line: ' + lineNo + '<br>Col: ' + columnNo + '<br>Trace: ' + (error ? error.stack : '') + '<hr>';
            return false;
        };
        window.addEventListener('unhandledrejection', function(event) {
            var el = document.getElementById('global-error-display');
            el.style.display = 'block';
            el.innerHTML += 'PROMISE REJECTION: ' + (event.reason ? (event.reason.stack || event.reason) : event) + '<hr>';
        });
    </script>
    <div id="app">
        <!-- Login View -->
        <div id="login-view" class="view hidden">
            <div class="login-card">
                <div class="logo">
                    <i data-lucide="map-pin"></i>
                    <h2>Traccar+</h2>
                </div>
                <form id="login-form">
                    <div class="input-group">
                        <label for="email">Email / Felhasználónév</label>
                        <input type="text" id="email" required minlength="3" maxlength="100" placeholder="admin@example.com" autocomplete="username">
                    </div>
                    <div class="input-group">
                        <label for="password">Jelszó</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" required minlength="4" maxlength="100" placeholder="••••••••" autocomplete="current-password">
                            <button type="button" id="toggle-password" class="password-toggle" tabindex="-1" title="Jelszó mutatása/elrejtése">
                                <i data-lucide="eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Bejelentkezés</button>
                    <div id="login-error" class="error-text hidden">Sikertelen bejelentkezés</div>
                </form>
            </div>
        </div>

        <!-- Main View -->
        <div id="main-view" class="view hidden">
            <!-- Sidebar -->
            <aside id="sidebar" class="sidebar">
                <div class="sidebar-header">
                    <button id="close-sidebar" class="icon-btn mobile-only" title="Vissza">
                        <i data-lucide="arrow-left"></i>
                    </button>
                    <h2>Eszközök</h2>
                    <button id="profile-btn" class="icon-btn" title="Profil szerkesztése">
                        <i data-lucide="user"></i>
                    </button>
                    <button id="theme-toggle" class="icon-btn" title="Téma váltása">
                        <i data-lucide="moon"></i>
                    </button>
                    <button id="logout-btn" class="icon-btn" title="Kijelentkezés">
                        <i data-lucide="log-out"></i>
                    </button>
                </div>
                <div id="device-list" class="device-list">
                    <!-- Device cards will be injected here -->
                    <div class="loading-state">Betöltés...</div>
                </div>
            </aside>

            <!-- Map Container -->
            <main id="map-container" class="map-container">
                <div id="map"></div>

                <!-- Floating Action Button for My Location -->
                <button id="btn-my-location" class="fab-btn" title="Saját helyzetem">
                    <i data-lucide="navigation"></i>
                </button>

                <!-- Mobile: toggle device list -->
                <button id="btn-toggle-list" class="fab-btn fab-secondary" title="Eszközlista">
                    <i data-lucide="users"></i>
                </button>

                <!-- Bottom Sheet Device Detail -->
                <div id="device-detail" class="detail-panel hidden">
                    <!-- Drag Handle (touch target) -->
                    <div class="sheet-drag-handle" id="sheet-drag-handle">
                        <div class="sheet-drag-bar"></div>
                    </div>

                    <!-- PEEK section: always visible when sheet is open -->
                    <div class="sheet-peek" id="sheet-peek">
                        <button class="close-btn" id="close-detail">
                            <i data-lucide="x"></i>
                        </button>
                        <div class="peek-row">
                            <div class="avatar avatar-uploadable" id="detail-avatar"
                                title="Kattints a profilkép módosításához">U</div>
                            <input type="file" id="avatar-upload" accept="image/*" class="hidden">
                            <div class="peek-info">
                                <h3 id="detail-name">User Name</h3>
                                <span id="detail-status" class="status-badge">Online</span>
                            </div>
                        </div>
                        <div class="peek-stats">
                            <div class="peek-stat">
                                <i data-lucide="activity"></i>
                                <span id="detail-speed">0 km/h</span>
                            </div>
                            <div class="peek-stat">
                                <i data-lucide="battery"></i>
                                <span id="detail-battery">- %</span>
                            </div>
                            <div class="peek-stat">
                                <i data-lucide="clock"></i>
                                <span id="detail-time">0 perce</span>
                            </div>
                        </div>
                    </div>

                    <!-- SCROLLABLE BODY: visible in half/full states -->
                    <div class="sheet-body" id="sheet-body">
                        <div class="detail-address" id="detail-address">
                            <i data-lucide="map-pin"></i>
                            <span>Cím keresése...</span>
                        </div>

                        <div class="detail-extra-info" id="detail-extra-info">
                            <!-- Extra info rows injected here -->
                        </div>

                        <div class="detail-actions" style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                            <select id="history-interval" class="history-select"
                                style="flex: 1; border-radius: var(--radius-md); border: 1px solid var(--color-border); padding: 0.5rem; background: var(--color-bg); color: var(--color-text);">
                                <option value="today">Ma</option>
                                <option value="yesterday">Tegnap</option>
                                <option value="last24">Elmúlt 24 óra</option>
                                <option value="last3days">Elmúlt 3 nap</option>
                                <option value="lastweek">Elmúlt 1 hét</option>
                            </select>
                            <button class="btn btn-secondary" id="btn-replay" style="flex: 1;">
                                <i data-lucide="history"></i> Betöltés
                            </button>
                        </div>
                        <div class="detail-actions" style="margin-top: 0.5rem; display: flex; gap: 0.5rem;">
                            <button class="btn btn-primary" id="btn-request-single" style="flex: 1;">
                                <i data-lucide="refresh-cw"></i> Frissítés
                            </button>
                            <button class="btn btn-secondary" id="btn-navigate" style="flex: 1;">
                                <i data-lucide="navigation"></i> Útvonal
                            </button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Profile Modal -->
    <div id="profile-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Profil szerkesztése</h2>
                <button class="close-btn" id="close-profile">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="profile-avatar-container">
                    <div class="avatar large avatar-uploadable" id="profile-avatar" title="Kattints a profilkép módosításához">U</div>
                    <input type="file" id="profile-avatar-upload" accept="image/*" class="hidden">
                </div>
                <div class="profile-info">
                    <h3 id="profile-name">User Name</h3>
                    <p id="profile-email">email@example.com</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Navigation Modal -->
    <div id="navigation-modal" class="modal hidden">
        <div class="modal-content" style="max-width: 300px;">
            <div class="modal-header">
                <h2>Útvonaltervezés</h2>
                <button class="close-btn" id="close-navigation">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="modal-body" style="display: flex; flex-direction: column; gap: 0.75rem;">
                <a href="#" id="nav-google" class="btn btn-secondary w-full" target="_blank" style="justify-content: center;">
                    Google Maps
                </a>
                <a href="#" id="nav-waze" class="btn btn-secondary w-full" target="_blank" style="justify-content: center;">
                    Waze
                </a>
                <a href="#" id="nav-apple" class="btn btn-secondary w-full" target="_blank" style="justify-content: center;">
                    Apple Maps
                </a>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Cache Buster: force-clear any stale Service Workers and caches -->
    <script>
        (function() {
            if ('serviceWorker' in navigator) {
                // Unregister all service workers
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    registrations.forEach(function(r) { r.unregister(); });
                });
                // Clear all caches
                if (window.caches) {
                    caches.keys().then(function(names) {
                        names.forEach(function(name) { caches.delete(name); });
                    });
                }
            }
        })();
    </script>

    <!-- App Entry Point -->
    <script type="module" src="src/main.js?v=11"></script>
</body>

</html>
